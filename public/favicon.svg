<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- squircle background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#shine)"/>
  <!-- horizon / web line -->
  <line x1="80" y1="256" x2="432" y2="256" stroke="#ffffff" stroke-opacity="0.35" stroke-width="6" stroke-linecap="round"/>
  <!-- W mark -->
  <path
    d="M 112 168 L 184 360 L 232 240 L 280 360 L 352 168"
    fill="none"
    stroke="#ffffff"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <!-- subtle node dots at the W tips -->
  <circle cx="112" cy="168" r="14" fill="#ffffff"/>
  <circle cx="352" cy="168" r="14" fill="#ffffff"/>
  <circle cx="232" cy="240" r="10" fill="#ffffff" fill-opacity="0.85"/>
</svg>
